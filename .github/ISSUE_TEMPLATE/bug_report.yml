name: Bug report
description: Report a defect or behavioral regression in molq
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Provide a minimal reproduction when possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
      placeholder: A short description of the bug.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Include the command, scheduler, code, and exact steps.
      placeholder: |
        1. Create this Submitor...
        2. Submit this job...
        3. Observe this output...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python version, molq version, OS, and scheduler backend.
    validations:
      required: true
